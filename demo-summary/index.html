<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딸깍 3줄 요약기</title>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  @font-face{
    font-family:'Moneygraphy-Rounded';
    src:url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Toss/Moneygraphy-Rounded.woff2') format('woff2');
    font-display:swap;
  }
  :root{
    --paper:#eef1f7; --ink:#141a2e; --cobalt:#2f5bff; --bubble:#fff;
    --spark:#ffd44d; --muted:rgba(20,26,46,0.55);
    --display:'Moneygraphy-Rounded','Do Hyeon',sans-serif;
    --body:'Pretendard',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{ box-sizing:border-box; margin:0; }
  body{
    background: radial-gradient(ellipse 70% 40% at 50% -5%, rgba(47,91,255,0.10), transparent 65%), var(--paper);
    color:var(--ink); font-family:var(--body); line-height:1.6; min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
  .wrap{ max-width:640px; margin:0 auto; padding:56px 20px 80px; }
  .eyebrow{ font-family:var(--mono); font-size:0.75rem; font-weight:700; letter-spacing:0.14em; color:var(--cobalt); }
  h1{ font-family:var(--display); font-size:clamp(2rem,7vw,2.8rem); margin:10px 0 6px; }
  h1 .hl{ background:linear-gradient(transparent 58%, var(--spark) 58%); padding:0 4px; }
  .sub{ color:var(--muted); font-size:0.95rem; margin-bottom:36px; }
  label{ display:block; font-family:var(--mono); font-size:0.72rem; font-weight:700; letter-spacing:0.12em; color:var(--cobalt); margin-bottom:8px; }
  textarea{
    width:100%; min-height:200px; background:var(--bubble); border:2.5px solid var(--ink); border-radius:14px;
    font-family:var(--body); font-size:0.98rem; color:var(--ink); padding:14px 16px; resize:vertical;
  }
  textarea:focus{ outline:3px solid rgba(47,91,255,0.35); outline-offset:2px; }
  .counter{ text-align:right; font-family:var(--mono); font-size:0.72rem; color:var(--muted); margin:6px 0 16px; }
  .btn{
    width:100%; background:var(--cobalt); color:#fff; border:2.5px solid var(--ink); border-radius:999px;
    font-family:var(--display); font-size:1.25rem; padding:16px; cursor:pointer;
    box-shadow:5px 6px 0 var(--ink); transition:transform .12s, box-shadow .12s;
  }
  .btn:hover{ transform:translate(-2px,-2px); box-shadow:7px 8px 0 var(--ink); }
  .btn:active{ transform:translate(0,0); box-shadow:3px 4px 0 var(--ink); }
  .btn:disabled{ opacity:.55; cursor:progress; }

  #result{ margin-top:32px; }
  .out{ background:var(--bubble); border:2.5px solid var(--ink); border-radius:18px; box-shadow:6px 8px 0 var(--ink); padding:26px; animation:pop .4s ease; }
  @keyframes pop{ from{ opacity:0; transform:translateY(8px);} }
  .out .k{ font-family:var(--mono); font-size:0.7rem; font-weight:700; letter-spacing:0.12em; color:var(--cobalt); margin-bottom:10px; }
  ol.lines{ padding-left:0; list-style:none; counter-reset:n; display:flex; flex-direction:column; gap:14px; margin-bottom:22px; }
  ol.lines li{
    counter-increment:n; display:flex; gap:14px; align-items:baseline; font-size:1rem; font-weight:600;
  }
  ol.lines li::before{
    content:counter(n); font-family:var(--display); font-size:1.2rem; color:#fff;
    background:var(--cobalt); border-radius:50%; width:32px; height:32px; flex-shrink:0;
    display:grid; place-items:center; transform:translateY(4px);
  }
  .keywords{ display:flex; flex-wrap:wrap; gap:8px; }
  .kw{ font-family:var(--mono); font-size:0.78rem; font-weight:700; border:2px solid var(--ink); border-radius:999px; padding:6px 14px; background:var(--paper); }
  .error{ background:#fff; border:2.5px solid var(--cobalt); border-radius:14px; padding:16px 18px; font-size:0.9rem; }
  .loading{ font-family:var(--mono); font-size:0.85rem; color:var(--muted); }
  footer{ margin-top:56px; text-align:center; font-family:var(--mono); font-size:0.72rem; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">DDALKKAK UNION · DEMO 02</div>
  <h1>딸깍 <span class="hl">3줄 요약기</span></h1>
  <p class="sub">공지, 기사, 강의자료, 뭐든 붙여넣으세요. 3줄과 키워드로 딸깍 정리해드립니다.</p>

  <label for="text">요약할 글</label>
  <textarea id="text" maxlength="6000" placeholder="여기에 긴 글을 붙여넣으세요..."></textarea>
  <div class="counter"><span id="count">0</span> / 6000</div>
  <button class="btn" id="go">3줄로 딸깍</button>

  <div id="result"></div>

  <footer>Powered by NVIDIA NIM (free API) · 프롬프트만 바꾸면 뭐든 됩니다</footer>
</div>

<script>
const ta = document.getElementById('text');
const countEl = document.getElementById('count');
const go = document.getElementById('go');
const resultEl = document.getElementById('result');

ta.addEventListener('input', () => countEl.textContent = ta.value.length);

go.addEventListener('click', async () => {
  const text = ta.value.trim();
  if(text.length < 50){ resultEl.innerHTML = '<div class="error">50자 이상의 글을 붙여넣어주세요!</div>'; return; }

  go.disabled = true; go.textContent = '요약 중...';
  resultEl.innerHTML = '<p class="loading">글을 꾹꾹 눌러 담는 중...</p>';

  try{
    const res = await fetch('/api/summarize', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });
    if(!res.ok) throw new Error('서버 응답 오류 ('+res.status+')');
    const data = await res.json();

    const lines = (data.lines || []).map(l => '<li>'+esc(l)+'</li>').join('');
    const kws = (data.keywords || []).map(k => '<span class="kw">#'+esc(k)+'</span>').join('');
    resultEl.innerHTML = `
      <div class="out">
        <div class="k">3줄 요약</div>
        <ol class="lines">${lines}</ol>
        <div class="k">키워드</div>
        <div class="keywords">${kws}</div>
      </div>`;
  }catch(err){
    resultEl.innerHTML = '<div class="error">요약에 실패했어요. 잠시 후 다시 시도해주세요.<br><small>'+esc(err.message)+'</small></div>';
  }finally{
    go.disabled = false; go.textContent = '3줄로 딸깍';
  }
});

function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
</script>
</body>
</html>
